name: Build Backend Image

on:
  push:
    branches:
      - main
      - 'release/*'

jobs:
  backend:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/hotel-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            echo "TAG=release-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build backend image
        run: |
          docker build \
            -t $IMAGE:${{ steps.vars.outputs.TAG }} \
            -t $IMAGE:${{ github.sha }} \
            ./backend

      - name: Push backend image
        run: |
          docker push $IMAGE:${{ steps.vars.outputs.TAG }}
          docker push $IMAGE:${{ github.sha }}