name: Build and Push Backend Image

on:
  pull_request:
    branches:
      - 'release/**'
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yaml'
  push:
    branches:
      - 'release/**'
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yaml'
  workflow_dispatch:

jobs:
  quality-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  build-backend:
    runs-on: ubuntu-latest
    needs: quality-backend

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hotel-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare tags
        id: prep
        run: |
          DATE_TAG="release-$(date +'%Y%m%d')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "date_tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.prep.outputs.date_tag }} \
            -t $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}-${{ steps.prep.outputs.sha_tag }} \
            ./backend

      - name: Push backend image
        if: github.event_name == 'push'
        run: |
          docker push $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}
          docker push $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}-${{ steps.prep.outputs.sha_tag }}
