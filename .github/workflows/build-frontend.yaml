name: Build and Push Frontend Image

on:
  pull_request:
    branches:
      - 'release/**'
      - 'main'
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yaml'
  push:
    branches:
      - 'release/**'
      - 'main'
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yaml'
  workflow_dispatch:

jobs:
  quality-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Run build
        working-directory: frontend
        run: npm run build

  build-frontend:
    runs-on: ubuntu-latest
    needs: quality-frontend

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hotel-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare tags
        id: prep
        run: |
          DATE_TAG="release-$(date +'%Y%m%d')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "date_tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build frontend image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.prep.outputs.date_tag }} \
            -t $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}-${{ steps.prep.outputs.sha_tag }} \
            ./frontend

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker push $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}
          docker push $IMAGE_NAME:${{ steps.prep.outputs.date_tag }}-${{ steps.prep.outputs.sha_tag }}
